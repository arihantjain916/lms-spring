spring.application.name=Learning Management System
server.servlet.context-path=/api
#spring.datasource.url=jdbc:postgresql://db:5432/lms for docker
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jps.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.defer-datasource-initialization=true
spring.jackson.serialization.fail-on-empty-beans=false
# serialize all Date/Instant response fields in IST (Jackson defaults to UTC otherwise, even though the JVM is IST)
spring.jackson.time-zone=Asia/Kolkata
#debug=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.cloudinary.url=${CLOUDINARY_URL}
server.error.whitelabel.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jwt.key=${JWT_SECRET}
spring.gemini.api-key=${GEMINI_API_KEY}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
#mail setup (leave MAIL_HOST empty to log emails instead of sending)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
#starttls for port 587, ssl for port 465
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
